name: FlaUI NUnit Automation Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore FlaUIPractice.sln

    - name: Build Solution
      run: msbuild FlaUIPractice.sln /p:Configuration=Release

    - name: Run FlaUI NUnit Tests
      run: |
        dotnet test FlaUITests/FlaUITests.csproj --configuration Release --no-build --logger:"allure;LogFileName=allure-results"
      continue-on-error: true 

    - name: Get Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Upload Allure Report as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Upload Screenshots on Failure
      # Changed path to 'ReportScreenshots' to match your NUnit Cleanup code
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: FlaUITests/bin/Release/net6.0-windows/ReportScreenshots/
        if-no-files-found: ignore
