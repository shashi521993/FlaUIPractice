name: FlaUI NUnit Automation Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore FlaUIPractice.sln

    - name: Build Solution
      run: msbuild FlaUIPractice.sln /p:Configuration=Release

    - name: Run FlaUI NUnit Tests
      # Added the logger flag back since you added [AllureNUnit] to your code
      run: |
        dotnet test FlaUITests/FlaUITests.csproj --configuration Release --no-build
      continue-on-error: true 
    - name: Setup Allure
      uses: allure-framework/setup-allure@v1
      if: always()
      with:
        allure-version: 2.24.0

    - name: Generate Allure Report
      if: always()
      run: |
        # Create directory if it doesn't exist to prevent generation failure
        if (!(Test-Path "FlaUITests/bin/Release/net6.0-windows/allure-results")) { 
          New-Item -ItemType Directory -Force -Path "FlaUITests/bin/Release/net6.0-windows/allure-results" 
        }
        allure generate FlaUITests/bin/Release/net6.0-windows/allure-results --clean -o allure-report
    - name: Upload Allure Report as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Upload Screenshots on Failure
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: FlaUITests/bin/Release/net6.0-windows/ReportScreenshots/
        if-no-files-found: ignore
