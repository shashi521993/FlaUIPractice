name: FlaUI Automation Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name : checkout repo
      uses: actions/checkout@v4
      
    - name: Setup .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' # This installs the missing framework 

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore FlaUIPractice.sln

    - name: Build Solution
      run: msbuild FlaUIPractice.sln /p:Configuration=Release

    - name: Run FlaUI Tests
      # We use 'vstest.console.exe' to run the tests. 
      # The runner handles the interactive session by default on windows-latest, 
      # but some complex UI interactions might require a screen resolution tweak.
      run: 
       dotnet test FlaUITests/FlaUITests.csproj --configuration Release --no-build
      
    - name: Upload Screenshots on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: FlaUIPractice/Screenshots/
        if-no-files-found: ignore
