name: FlaUI NUnit Automation Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore FlaUIPractice.sln

    - name: Build Solution
      run: msbuild FlaUIPractice.sln /p:Configuration=Release

    - name: Run FlaUI NUnit Tests
      run: |
        dotnet test FlaUITests/FlaUITests.csproj --configuration Release --no-build
      continue-on-error: true 

    # ✅ Fix 1: Use PowerShell to download and extract (handles redirects properly)
    - name: Download and Setup Allure CLI
      if: always()
      shell: pwsh
      run: |
        $allureVersion = "2.27.0"
        $url = "https://github.com/allure-framework/allure2/releases/download/$allureVersion/allure-$allureVersion.zip"
        Write-Host "Downloading Allure from $url"
        Invoke-WebRequest -Uri $url -OutFile "allure.zip"
        Expand-Archive -Path "allure.zip" -DestinationPath "." -Force
        # Verify extraction
        Get-ChildItem -Path "./allure-$allureVersion/bin"

    # ✅ Fix 2: Use the explicit relative path to call allure.bat
    - name: Generate Allure Report
      if: always()
      shell: pwsh
      run: |
        ./allure-2.27.0/bin/allure.bat generate FlaUITests/bin/Release/net6.0-windows/allure-results --clean -o allure-report

    - name: Upload Allure Report as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Upload Screenshots on Failure
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: FlaUITests/bin/Release/net6.0-windows/ReportScreenshots/
        if-no-files-found: ignore
